<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Unavailable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
<div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-gray-100 p-8">

    <div class="text-center mb-6">
        <div class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center text-white font-bold mx-auto mb-4"
             th:text="${#strings.substring(event.user.username, 0, 1).toUpperCase()}"></div>
        <p class="text-gray-400 font-bold text-sm" th:text="${event.user.username}"></p>
        <h2 class="text-xl font-bold text-gray-900" th:text="${event.title}"></h2>
    </div>

    <div class="bg-red-50 border border-red-100 rounded-lg p-4 mb-6 flex gap-3 text-left">
        <i class="fa-solid fa-circle-exclamation text-red-500 mt-1"></i>
        <div>
            <p class="text-red-900 font-bold text-sm" th:text="${errorTitle}"></p>
            <p class="text-red-700 text-sm mt-1" th:text="${errorMessage}"></p>
            <p class="text-xs text-red-300 mt-2">
                Ref: <span th:text="${#strings.randomAlphanumeric(10)}"></span>
            </p>
        </div>
    </div>

    <div class="flex flex-col gap-2">
        <button onclick="window.history.back()"
                class="w-full py-2.5 bg-black text-white font-bold rounded-lg hover:bg-zinc-800 transition">
            ← Go Back & Choose Another Time
        </button>
    </div>

</div>
</body>
</html>
