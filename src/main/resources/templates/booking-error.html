<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
<div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="text-center mb-6">
        <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold mx-auto mb-4"
             th:text="${#strings.substring(event.user.username, 0, 1).toUpperCase()}"></div>
        <p class="text-gray-400 font-bold text-sm" th:text="${event.user.username}"></p>
        <h2 class="text-xl font-bold text-gray-900" th:text="${event.title}"></h2>
    </div>

    <div class="bg-blue-50 border border-blue-100 rounded-lg p-4 mb-6 flex gap-3 text-left">
        <i class="fa-solid fa-circle-info text-blue-500 mt-1"></i>
        <div>
            <p class="text-blue-900 font-bold text-sm" th:text="${errorTitle}"></p>
            <p class="text-blue-700 text-sm" th:text="${errorMessage}"></p>
            <p class="text-xs text-blue-400 mt-2">Trace reference: <span th:text="${#strings.randomAlphanumeric(10)}"></span></p>
        </div>
    </div>

    <div class="flex flex-col gap-2">
        <button onclick="window.history.back()" class="w-full py-2.5 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition">Back</button>
    </div>
</div>
</body>
</html>
