<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Availability | Cal Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f9fafb] text-gray-900" x-data="{ openScheduleModal: false }">

<div class="flex min-h-screen">
    <aside class="w-64 bg-white border-r border-gray-200 p-4 space-y-2 hidden md:flex flex-col">
        <div class="font-bold text-xl px-4 py-4 flex items-center gap-2">
            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white text-xs">C</div>
            Cal Clone
        </div>
        <nav class="space-y-1">
            <a href="/events" class="flex items-center gap-3 px-4 py-2 text-gray-500 hover:bg-gray-50 rounded-md transition">
                <i class="fa-solid fa-link"></i> Event types
            </a>
            <a href="/bookings" class="flex items-center gap-3 px-4 py-2 text-gray-500 hover:bg-gray-50 rounded-md transition">
                <i class="fa-solid fa-calendar"></i> Bookings
            </a>
            <a href="/availability" class="flex items-center gap-3 px-4 py-2 bg-gray-100 text-gray-900 rounded-md font-medium">
                <i class="fa-solid fa-clock"></i> Availability
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-10">
        <div class="max-w-4xl mx-auto">
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-xl font-bold text-gray-900">Availability</h1>
                    <p class="text-gray-500 text-sm">Configure times when you are available for bookings.</p>
                </div>
                <button @click="openScheduleModal = true" class="bg-black text-white px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 hover:bg-zinc-800 transition">
                    <i class="fa-solid fa-plus text-xs"></i> New
                </button>
            </header>

            <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
                <div th:each="schedule : ${schedules}" class="border-b border-gray-100 p-5 flex justify-between items-center group hover:bg-gray-50">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <a th:href="@{'/availability/edit/' + ${schedule.id}}"
                               class="font-semibold text-gray-800 hover:text-blue-600 transition">
                                Working hours
                            </a>
                            <span th:if="${schedule.isDefault}" class="bg-gray-100 text-gray-600 text-[10px] uppercase font-bold px-1.5 py-0.5 rounded border border-gray-200">Default</span>
                        </div>
                        <div class="text-sm text-gray-500">
                            <span th:text="${schedule.activeDays}">Mon - Fri</span>,
                            <span th:text="${schedule.timeRange}">9:00 AM - 5:00 PM</span>
                        </div>
                        <div class="text-xs text-gray-400 flex items-center gap-1">
                            <i class="fa-solid fa-globe text-[10px]"></i>
                            <span th:text="${user.timezone}">Asia/Kolkata</span>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <button class="p-2 text-gray-400 opacity-0 group-hover:opacity-100 hover:text-gray-600 transition">
                            <i class="fa-solid fa-ellipsis"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div x-show="openScheduleModal" x-cloak
     class="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm transition"
     x-transition.opacity>

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-8" @click.away="openScheduleModal = false">
        <div class="mb-6">
            <h2 class="text-xl font-bold text-gray-900">Add a new schedule</h2>
        </div>

        <form th:action="@{'/availability/schedule/create/' + ${user.id}}" method="post">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="scheduleName" placeholder="Working hours" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-1 focus:ring-black focus:border-black focus:outline-none text-sm">
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3">
                <button type="button" @click="openScheduleModal = false" class="px-4 py-2 text-gray-600 text-sm font-medium hover:bg-gray-100 rounded-md transition">
                    Cancel
                </button>
                <button type="submit" class="px-6 py-2 bg-black text-white text-sm font-semibold rounded-md hover:bg-zinc-800 transition">
                    Continue
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
