<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:x-transition="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Availability | Cal Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f9fafb] text-gray-900" x-data="{ openScheduleModal: false }">

<div class="flex min-h-screen">

    <aside th:replace="~{fragments :: sidebar('availability')}"></aside>

    <main class="flex-1 p-10">
        <div class="max-w-4xl mx-auto">
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-xl font-bold text-gray-900">Availability</h1>
                    <p class="text-gray-500 text-sm">Configure times when you are available for bookings.</p>
                </div>
                <button @click="openScheduleModal = true" class="bg-black text-white px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 hover:bg-zinc-800 transition">
                    <i class="fa-solid fa-plus text-xs"></i> New
                </button>
            </header>

            <div class="bg-white border border-gray-200 rounded-lg shadow-sm">
                <div th:each="schedule : ${schedules}" class="border-b border-gray-100 p-5 flex justify-between items-center group hover:bg-gray-50">
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <a th:href="@{'/availability/edit/' + ${schedule.id}}"
                               class="font-semibold text-gray-800 hover:text-blue-600 transition">
                                <span th:text="${schedule.name}">Working hours</span>
                            </a>
                            <span th:if="${schedule.isDefault}" class="bg-gray-100 text-gray-600 text-[10px] uppercase font-bold px-1.5 py-0.5 rounded border border-gray-200">Default</span>
                        </div>
                        <div class="text-sm text-gray-500">
                            <span th:text="${schedule.activeDays}">Mon - Fri</span>,
                            <span th:text="${schedule.timeRange}">9:00 AM - 5:00 PM</span>
                        </div>
                        <div class="text-xs text-gray-400 flex items-center gap-1">
                            <i class="fa-solid fa-globe text-[10px]"></i>
                            <span th:text="${timezone}">Asia/Kolkata</span>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <div class="relative" x-data="{ openMenu: false }">
                            <button @click="openMenu = !openMenu"
                                    @click.outside="openMenu = false"
                                    class="p-2 text-gray-400 opacity-0 group-hover:opacity-100 hover:text-gray-600 transition rounded-md hover:bg-gray-100">
                                <i class="fa-solid fa-ellipsis"></i>
                            </button>

                            <div x-show="openMenu" x-cloak
                                 x-transition:enter="transition ease-out duration-100"
                                 x-transition:enter-start="opacity-0 scale-95"
                                 x-transition:enter-end="opacity-100 scale-100"
                                 class="absolute right-0 mt-1 w-40 bg-white border border-gray-200 rounded-lg shadow-lg z-50 py-1">


                                <form th:action="@{'/availability/schedule/duplicate/' + ${schedule.id}}" method="post">
                                    <button type="submit"
                                            class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                                        <i class="fa-regular fa-copy text-gray-400 w-4"></i>
                                        Duplicate
                                    </button>
                                </form>


                                <form th:if="${!schedule.isDefault()}"
                                      th:action="@{'/availability/schedule/delete/' + ${schedule.id}}" method="post">
                                    <button type="submit"
                                            onclick="return confirm('Are you sure you want to delete this schedule?')"
                                            class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2">
                                        <i class="fa-regular fa-trash-can text-red-400 w-4"></i>
                                        Delete
                                    </button>
                                </form>


                                <div th:if="${schedule.isDefault()}"
                                     class="px-4 py-2 text-sm text-gray-300 flex items-center gap-2 cursor-not-allowed"
                                     title="Cannot delete the default schedule">
                                    <i class="fa-regular fa-trash-can w-4"></i>
                                    Delete
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div x-show="openScheduleModal" x-cloak
     class="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm transition"
     x-transition.opacity>

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-8" @click.away="openScheduleModal = false">
        <div class="mb-6">
            <h2 class="text-xl font-bold text-gray-900">Add a new schedule</h2>
        </div>

        <form th:action="@{'/availability/schedule/create/' + ${user.id}}" method="post">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="scheduleName" placeholder="Working hours" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-1 focus:ring-black focus:border-black focus:outline-none text-sm">
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3">
                <button type="button" @click="openScheduleModal = false" class="px-4 py-2 text-gray-600 text-sm font-medium hover:bg-gray-100 rounded-md transition">
                    Cancel
                </button>
                <button type="submit" class="px-6 py-2 bg-black text-white text-sm font-semibold rounded-md hover:bg-zinc-800 transition">
                    Continue
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
