<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bookings - Cal Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-[#f3f4f6] flex h-screen text-gray-900">

<aside th:replace="~{fragments :: sidebar('bookings')}"></aside>

<main class="flex-1 overflow-y-auto">
    <div class="max-w-6xl mx-auto p-8">
        <header class="mb-6">
            <h1 class="text-xl font-bold">Bookings</h1>
            <p class="text-sm text-gray-500">See upcoming and past events booked through your event type links.</p>
        </header>

        <div class="flex items-center justify-between mb-6">
            <div class="flex bg-white p-1 rounded-lg border border-gray-200 text-sm font-medium">
                <a th:href="@{/bookings(filter='upcoming')}"
                   th:classappend="${filter == 'upcoming'} ? 'bg-gray-100' : ''"
                   class="px-3 py-1.5 rounded-md">Upcoming</a>
                <a th:href="@{/bookings(filter='past')}"
                   th:classappend="${filter == 'past'} ? 'bg-gray-100' : ''"
                   class="px-3 py-1.5">Past</a>
                <a th:href="@{/bookings(filter='cancelled')}"
                   th:classappend="${filter == 'cancelled'} ? 'bg-gray-100' : ''"
                   class="px-3 py-1.5">Cancelled</a>
                <button class="px-3 py-1.5 text-gray-500 hover:text-gray-700 border-l border-gray-200 ml-1">
                    <i class="fa-solid fa-sliders mr-1.5"></i>Filter
                </button>
            </div>

            <button class="text-sm font-medium text-gray-600 bg-white border border-gray-200 px-3 py-1.5 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-bars-staggered"></i> Saved filters <i class="fa-solid fa-chevron-down text-xs"></i>
            </button>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">

            <div class="bg-gray-50 px-6 py-2 border-b border-gray-200">
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Today</span>
            </div>

            <div th:each="appt : ${bookings}" class="group border-b border-gray-100 last:border-0 hover:bg-gray-50 transition-colors">
                <div class="flex items-start justify-between p-6">
                    <div class="flex gap-8">

                        <div class="min-w-[120px]">
                            <p class="text-sm font-medium" th:text="${#temporals.format(appt.date, 'EEE, dd MMM')}">Tue, 21 Apr</p>
                            <p class="text-sm text-gray-500" th:text="${appt.startTime}">1:30pm</p>

                            <a th:if="${appt.meetingLink != null and !#strings.isEmpty(appt.meetingLink)}"
                               th:href="${appt.meetingLink}"
                               target="_blank"
                               rel="noopener noreferrer"
                               class="flex items-center gap-2 text-blue-600 text-sm mt-1 font-medium hover:underline">
                                <i class="fa-solid fa-video text-xs text-gray-600"></i>
                                Join Cal Video
                            </a>
                            <span th:unless="${appt.meetingLink != null and !#strings.isEmpty(appt.meetingLink)}"
                                  class="flex items-center gap-2 text-gray-400 text-sm mt-1">
    <i class="fa-solid fa-video text-xs"></i>
    No link yet
</span>
                        </div>

                        <div>
                            <p class="text-sm font-medium text-gray-900 mb-0.5">
                                <span th:text="${appt.eventType.title} + ' with ' + ${appt.guestName}"></span>
                            </p>
                            <p class="text-sm text-gray-500 italic" th:if="${appt.notes}" th:text="'&quot;' + ${appt.notes} + '&quot;'"></p>
                            <p class="text-sm text-gray-500 mt-0.5" th:text="'Guest: ' + ${appt.guestName}"></p>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">

                        <!-- Cancel Button -->
                        <form th:action="@{'/book/cancel/' + ${appt.id}}" method="post">
                            <input type="hidden" name="reason" value="User cancelled"/>

                            <!-- CSRF (if Spring Security enabled) -->
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <button type="submit"
                                    class="text-red-500 text-sm hover:underline">
                                Cancel
                            </button>
                        </form>

                        <!-- 3 dots menu -->
                        <button class="p-2 text-gray-400 hover:bg-gray-200 rounded-md transition">
                            <i class="fa-solid fa-ellipsis"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-20">
                <div class="bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-regular fa-calendar text-gray-400"></i>
                </div>
                <h3 class="font-bold text-gray-900">No bookings yet</h3>
                <p class="text-sm text-gray-500">Once someone books a meeting, it will appear here.</p>
            </div>


            <div class="px-6 py-3 border-t border-gray-200 flex items-center justify-between text-sm text-gray-500">
                <div class="flex items-center gap-2">

                    <select id="pageSize"
                            th:data-filter="${filter}"
                            class="bg-transparent border border-gray-300 rounded px-1 py-0.5 outline-none">
                        <option value="10" th:selected="${pageSize == 10}">10</option>
                        <option value="25" th:selected="${pageSize == 25}">25</option>

                    </select>
                    <span>rows per page</span>
                </div>

                    <div class="flex items-center gap-4">
    <span th:if="${totalItems > 0}">
        <span th:text="${(currentPage * pageSize) + 1}"></span> -

        <span th:text="${(currentPage + 1) * pageSize > totalItems
                        ? totalItems
                        : (currentPage + 1) * pageSize}"></span>

        of
        <span th:text="${totalItems}"></span>
    </span>

                        <div class="flex gap-1">

                        <a th:href="@{/bookings(page=${currentPage - 1}, size=${pageSize}, filter=${filter})}"
                           th:classappend="${currentPage <= 0} ? 'opacity-20 pointer-events-none' : 'hover:bg-gray-100'"
                           class="p-1 px-2 border border-gray-200 rounded transition text-gray-600">
                            <i class="fa-solid fa-chevron-left text-xs"></i>
                        </a>

                        <a th:href="@{/bookings(page=${currentPage + 1}, size=${pageSize}, filter=${filter})}"
                           th:classappend="${currentPage + 1 >= totalPages} ? 'opacity-20 pointer-events-none' : 'hover:bg-gray-100'"
                           class="p-1 px-2 border border-gray-200 rounded transition text-gray-600">
                            <i class="fa-solid fa-chevron-right text-xs"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    document.getElementById("pageSize").addEventListener("change", function () {
        const size = this.value;
        const filter = this.getAttribute("data-filter");

        window.location.href = `/bookings?page=0&size=${size}&filter=${filter}`;
    });
</script>

</body>
</html>
