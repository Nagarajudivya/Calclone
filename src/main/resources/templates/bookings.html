<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bookings - Cal Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex h-screen">

<!-- SIDEBAR (same as events.html) -->
<aside class="w-64 border-r border-gray-200 flex flex-col h-screen bg-white shrink-0">
    <div class="p-6">
        <div class="flex items-center gap-2 font-bold text-xl">
            <span class="bg-black text-white w-8 h-8 flex items-center justify-center rounded-md">c</span>
            Cal Clone
        </div>
    </div>
    <nav class="flex-1 px-4 space-y-1">
        <a href="/events"
           class="flex items-center gap-3 px-3 py-2 text-gray-500 hover:bg-gray-50 rounded-lg transition">
            <i class="fa-solid fa-link w-5"></i> Event types
        </a>
        <a href="/bookings"
           class="flex items-center gap-3 px-3 py-2 text-gray-900 bg-gray-100 rounded-lg font-medium">
            <i class="fa-regular fa-calendar w-5"></i> Bookings
        </a>
    </nav>
    <div class="p-4 border-t border-gray-100">
        <div class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer">
            <div class="w-8 h-8 bg-zinc-900 rounded-full flex items-center justify-center text-white text-xs font-bold"
                 th:text="${#authentication != null ? #strings.substring(#authentication.name, 0, 1).toUpperCase() : 'U'}">
            </div>
            <div class="flex-1 overflow-hidden">
                <p class="text-sm font-bold text-gray-900 truncate"
                   th:text="${#authentication != null ? #authentication.name : 'User'}"></p>
                <p class="text-xs text-gray-500 truncate">Settings</p>
            </div>
        </div>
    </div>
</aside>

<!-- MAIN CONTENT -->
<main class="flex-1 overflow-y-auto bg-white">
    <div class="p-10 max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Bookings</h1>
        <p class="text-gray-500 mb-8">See upcoming and past events booked through your event type links.</p>

        <div class="space-y-4">

            <!-- BOOKING CARDS -->
            <div th:each="appt : ${bookings}"
                 class="flex items-center justify-between p-6 border border-gray-100 rounded-xl hover:border-gray-300 transition shadow-sm bg-white">
                <div class="flex items-center gap-6">
                    <!-- DATE -->
                    <div class="text-center border-r border-gray-100 pr-6 min-w-[80px]">
                        <p class="text-xs font-bold text-gray-400 uppercase"
                           th:text="${#temporals.format(appt.date, 'MMM')}"></p>
                        <p class="text-2xl font-bold text-gray-900"
                           th:text="${#temporals.format(appt.date, 'dd')}"></p>
                    </div>
                    <!-- DETAILS -->
                    <div>
                        <h3 class="font-bold text-lg text-gray-900"
                            th:text="${appt.eventType.title}"></h3>
                        <div class="flex items-center gap-3 text-sm text-gray-500 mt-1">
                            <span class="font-semibold text-gray-700"
                                  th:text="${appt.guestName}"></span>
                            <span>&bull;</span>
                            <span th:text="${appt.startTime} + ' (India Standard Time)'"></span>
                        </div>
                        <p class="text-xs text-gray-400 mt-1"
                           th:text="${appt.guestEmail}"></p>
                    </div>
                </div>
                <!-- RIGHT SIDE -->
                <div class="flex items-center gap-4">
                    <span class="px-3 py-1 bg-green-50 text-green-700 text-[10px] font-bold rounded uppercase tracking-widest">
                        Confirmed
                    </span>
                    <a th:href="@{'/booking-success/' + ${appt.id}}"
                       class="text-gray-400 hover:text-black transition">
                        <i class="fa-solid fa-angle-right text-xl"></i>
                    </a>
                </div>
            </div>

            <!-- EMPTY STATE -->
            <div th:if="${#lists.isEmpty(bookings)}"
                 class="text-center py-24 border-2 border-dashed border-gray-100 rounded-2xl">
                <i class="fa-regular fa-calendar-check text-5xl text-gray-200 mb-4"></i>
                <h3 class="text-gray-900 font-bold mt-4">No bookings yet</h3>
                <p class="text-gray-500 text-sm mt-1">Once someone books a meeting, it will appear here.</p>
            </div>

        </div>
    </div>
</main>

</body>
</html>
