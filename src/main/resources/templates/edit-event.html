<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>

<body class="bg-[#f3f4f6] text-gray-900" x-data="initEventEdit()">

<nav class="bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center sticky top-0 z-20"
     x-data="{ showEmbed: false, copied: false }">
    <div class="flex items-center gap-4">
        <a th:href="@{'/events/' + ${user.id}}" class="text-gray-400 hover:text-gray-600 transition">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <h1 class="font-semibold text-base flex items-center gap-2">
            <span class="text-gray-500">Event types /</span>
            <span th:text="${event.title}">meetings</span>
        </h1>
    </div>
    <div class="flex items-center gap-2">
        <form th:action="@{'/events/toggle/' + ${event.id}}" method="post">
            <button type="submit"
                    class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none"
                    th:classappend="${event.active} ? 'bg-black' : 'bg-gray-200'">
                <span class="inline-block h-3 w-3 transform rounded-full bg-white transition-transform"
                      th:classappend="${event.active} ? 'translate-x-5' : 'translate-x-1'"></span>
            </button>
        </form>

        <a th:href="@{'/events/book/' + ${user.username} + '/' + ${event.slug}}"
           target="_blank"
           class="p-2 text-gray-500 hover:bg-gray-100 rounded-md" title="Open booking page">
            <i class="fa-solid fa-arrow-up-right-from-square text-sm"></i>
        </a>

        <button type="button"
                th:data-slug="@{'/events/book/' + ${user.username} + '/' + ${event.slug}}"
                @click="
                    const slug = $el.getAttribute('data-slug');
                    const url = window.location.origin + slug;
                    navigator.clipboard.writeText(url).then(() => {
                        copied = true;
                        setTimeout(() => copied = false, 2000);
                    });
                "
                class="p-2 text-gray-500 hover:bg-gray-100 rounded-md" title="Copy link">
            <i class="fa-solid fa-check text-sm text-green-500" x-show="copied"></i>
            <i class="fa-solid fa-link text-sm" x-show="!copied"></i>
        </button>

        <a th:href="@{'/events/delete/' + ${event.id} + '/' + ${user.id}}"
           onclick="return confirm('Are you sure you want to delete this event?')"
           class="p-2 text-red-500 hover:bg-red-50 rounded-md mr-2" title="Delete">
            <i class="fa-solid fa-trash-can text-sm"></i>
        </a>

        <button type="submit" form="eventForm"
                class="bg-[#111827] text-white px-4 py-1.5 rounded-md text-sm font-medium hover:bg-gray-800 transition">
            Save
        </button>
    </div>
</nav>

<div class="flex min-h-screen">
    <aside class="w-16 bg-white border-r border-gray-200 flex flex-col items-center py-4 gap-6 hidden md:flex">
        <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-white text-xs font-bold uppercase"
             th:text="${#strings.substring(user.username, 0, 1)}">U</div>
    </aside>

    <!-- LEFT SIDEBAR NAV — only nav buttons here, no content -->
    <aside class="w-64 bg-[#f3f4f6] p-4 space-y-1">
        <nav class="space-y-1">
            <!-- Basics tab button -->
            <button @click="activeTab = 'basics'"
                    :class="activeTab === 'basics' ? 'bg-white text-black shadow-sm' : 'text-gray-600 hover:bg-gray-200'"
                    class="w-full flex justify-between items-center px-3 py-2 rounded-md text-sm font-medium transition text-left">
                <span class="flex items-center gap-3">
                    <i class="fa-solid fa-link w-4 text-gray-400"></i> Basics
                </span>
                <i class="fa-solid fa-chevron-right text-[10px]" x-show="activeTab === 'basics'"></i>
            </button>

            <!-- Availability tab button — was commented out, now fixed -->
            <button @click="activeTab = 'availability'"
                    :class="activeTab === 'availability' ? 'bg-white text-black shadow-sm' : 'text-gray-600 hover:bg-gray-200'"
                    class="w-full flex flex-col px-3 py-2 rounded-md text-sm font-medium transition text-left group">
                <div class="flex justify-between items-center w-full">
                    <span class="flex items-center gap-3">
                        <i class="fa-solid fa-calendar-days w-4 text-gray-400"></i> Availability
                    </span>
                    <i class="fa-solid fa-chevron-right text-[10px]" x-show="activeTab === 'availability'"></i>
                </div>
                <!-- Shows currently selected schedule name under the button -->
                <span class="text-[11px] text-gray-400 ml-7 mt-0.5 font-normal"
                      x-text="selectedSchedule?.name"></span>
            </button>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-8 overflow-y-auto bg-white">
        <div class="max-w-3xl mx-auto">
            <form id="eventForm" th:action="@{'/events/update/' + ${event.id}}" th:object="${event}" method="post">

                <input type="hidden" name="scheduleId" x-model="selectedScheduleId">


                <div x-show="activeTab === 'basics'" class="space-y-6" x-cloak>
                    <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Title</label>
                                <input type="text"
                                       th:field="*{title}"
                                       x-ref="titleInput"
                                       x-model="title"
                                       @input="generateSlug($event.target.value)"
                                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-black focus:outline-none transition text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
                                <div class="border border-gray-300 rounded-md overflow-hidden focus-within:ring-2 focus-within:ring-black">
                                    <div class="bg-white px-3 py-2 border-b border-gray-100 flex gap-4 text-gray-400">
                                        <i class="fa-solid fa-bold text-sm cursor-pointer hover:text-black"></i>
                                        <i class="fa-solid fa-italic text-sm cursor-pointer hover:text-black"></i>
                                        <i class="fa-solid fa-link text-sm cursor-pointer hover:text-black"></i>
                                    </div>
                                    <textarea th:field="*{description}" rows="4"
                                              class="w-full px-3 py-3 text-sm focus:outline-none resize-none"
                                              placeholder="Description"></textarea>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1.5">URL</label>
                                <div class="flex items-center border border-gray-300 rounded-md bg-gray-50 overflow-hidden focus-within:ring-2 focus-within:ring-black">
                                    <span class="pl-3 text-gray-400 text-sm whitespace-nowrap"
                                          th:text="'cal.com/' + ${user.username} + '/'">cal.com/user/</span>
                                    <input type="text"
                                           th:field="*{slug}"
                                           x-ref="slugInput"
                                           x-model="slug"
                                           class="w-full p-2 bg-transparent focus:outline-none text-sm">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Duration</label>
                        <div class="flex items-center border border-gray-300 rounded-md w-full focus-within:ring-2 focus-within:ring-black">
                            <input type="number" th:field="*{duration}"
                                   class="flex-1 p-2 focus:outline-none text-sm">
                            <span class="pr-3 text-gray-400 text-sm">Minutes</span>
                        </div>
                    </div>
                </div>


                <div x-show="activeTab === 'availability'" x-cloak class="space-y-6">
                    <h2 class="text-xl font-semibold mb-6">Availability</h2>

                    <!-- Schedule dropdown -->
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Schedule</label>
                        <div @click="dropdownOpen = !dropdownOpen"
                             class="border border-gray-200 rounded-lg p-4 flex justify-between items-center bg-white shadow-sm cursor-pointer hover:border-gray-400 transition">
                            <div class="flex items-center gap-3">
                                <span class="font-medium text-sm" x-text="selectedSchedule?.name"></span>
                                <span x-show="selectedSchedule?.isDefault"
                                      class="bg-blue-50 text-blue-600 text-[11px] px-2 py-0.5 rounded font-bold uppercase tracking-tight">Default</span>
                            </div>
                            <i class="fa-solid fa-chevron-down text-gray-400 text-xs transition-transform"
                               :class="dropdownOpen ? 'rotate-180' : ''"></i>
                        </div>

                        <div x-show="dropdownOpen" @click.away="dropdownOpen = false"
                             class="absolute z-10 w-full mt-2 bg-white border border-gray-200 rounded-lg shadow-lg py-1">
                            <template x-for="sch in schedules" :key="sch.id">

                                <div @click="selectedScheduleId = sch.id; dropdownOpen = false"
                                     class="px-4 py-3 hover:bg-gray-50 cursor-pointer flex justify-between items-center">
                                    <div class="flex flex-col">
                                        <span class="text-sm font-medium text-gray-900" x-text="sch.name"></span>
                                        <span class="text-xs text-gray-500"
                                              x-text="sch.isDefault ? 'Default schedule' : 'Custom schedule'"></span>
                                    </div>

                                    <i class="fa-solid fa-check text-black text-xs"
                                       x-show="selectedScheduleId == sch.id"></i>
                                </div>
                            </template>
                        </div>
                    </div>


                    <div class="space-y-4 py-4 px-2 mt-4" x-show="selectedSchedule">
                        <template x-for="(time, day) in (selectedSchedule?.slots || {})" :key="day">
                            <div class="grid grid-cols-[120px_1fr] items-center text-sm">
                                <span class="font-medium"
                                      :class="time === 'Unavailable' ? 'text-gray-400' : 'text-gray-900'"
                                      x-text="day"></span>
                                <div x-show="time !== 'Unavailable'" class="flex items-center gap-4">
                                    <span x-text="time.split(' - ')[0]"></span>
                                    <span class="text-gray-300">-</span>
                                    <span x-text="time.split(' - ')[1]"></span>
                                </div>
                                <span x-show="time === 'Unavailable'" class="text-gray-400">Unavailable</span>
                            </div>
                        </template>
                    </div>

                    <div class="pt-8 border-t border-gray-100 flex justify-between items-center text-xs text-gray-500">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-earth-americas"></i>
                            <span>Asia/Kolkata</span>
                        </div>

                        <a :href="'/availability/edit/' + selectedScheduleId"
                           class="text-gray-900 font-semibold hover:underline">Edit availability</a>
                    </div>
                </div>

            </form>
        </div>
    </main>
</div>


<script th:inline="javascript">
    function initEventEdit() {
        const schedules = /*[[${schedules}]]*/ [];
        const savedScheduleId = /*[[${event.scheduleId}]]*/ null;

        return {
            activeTab: 'basics',
            dropdownOpen: false,
            schedules: schedules,
            selectedScheduleId: savedScheduleId,


            get selectedSchedule() {
                return this.schedules.find(s => s.id == this.selectedScheduleId)
                    || this.schedules.find(s => s.isDefault)
                    || this.schedules[0];
            },

            init() {
                if (!this.selectedScheduleId && this.schedules.length > 0) {
                    const def = this.schedules.find(s => s.isDefault);
                    this.selectedScheduleId = def ? def.id : this.schedules[0].id;
                }
                this.title = this.$refs.titleInput?.value || '';
                this.slug = this.$refs.slugInput?.value || '';
            },

            generateSlug(value) {
                this.slug = value.toLowerCase()
                    .replace(/[^a-z0-9 ]/g, '')
                    .replace(/\s+/g, '-');
            }
        };
    }
    /*]]>*/
</script>

</body>
</html>
