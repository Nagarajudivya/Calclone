<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
<div class="max-w-md w-full bg-white p-8 rounded-xl shadow-sm border border-gray-200">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Sign in to Cal Clone</h1>
        <p class="text-gray-500 mt-2">Enter your credentials to continue</p>
    </div>

    <div th:if="${param.error}"
         class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg text-center">
        Invalid email or password.
    </div>


    <div class="space-y-4">

        <a th:href="@{/oauth2/authorization/google}"
           class="w-full flex items-center justify-center gap-3 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition font-medium text-gray-700">
            <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5">
            Sign in with Google
        </a>


        <div class="relative flex items-center justify-center my-6">
            <span class="absolute px-3 bg-white text-xs text-gray-400 uppercase">Or</span>
            <div class="w-full border-t border-gray-200"></div>
        </div>

    </div>

    <form th:action="@{/login}" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" name="username" required placeholder="you@example.com"
                   class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-1 focus:ring-black outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required placeholder="••••••••"
                   class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-1 focus:ring-black outline-none">
        </div>
        <button type="submit"
                class="w-full bg-black text-white py-2.5 rounded-lg font-bold hover:bg-zinc-800 transition">
            Sign in
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
        Don't have an account?
        <a href="/register" class="text-black font-semibold hover:underline">Sign up</a>
    </p>
</div>
</body>
</html>
