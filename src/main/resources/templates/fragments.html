<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My App</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<aside th:fragment="sidebar(activePage)"
       class="w-64 bg-white border-r border-gray-200 flex flex-col h-screen sticky top-0">
    <div x-data="{ open: false }" class="relative p-2 mt-2">

        <!-- Profile Header -->
        <div @click="open = !open"
             class="flex items-center gap-3 px-3 py-2 hover:bg-gray-100 rounded-lg cursor-pointer transition group">

            <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-white text-[11px] font-bold uppercase">
                <span th:text="${user != null ? #strings.substring(user.username, 0, 1) : 'U'}"></span>
            </div>

            <div class="flex items-center gap-2 flex-1 min-w-0">
            <span class="font-semibold text-gray-900 truncate text-sm"
                  th:text="${user != null ? user.username : 'User Name'}"></span>
                <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
            </div>
        </div>

        <!-- Dropdown -->
        <div x-show="open"
             @click.outside="open = false"
             class="absolute left-2 mt-2 w-56 bg-white border border-gray-200 rounded-lg shadow-lg z-50">

            <a th:href="@{/profiles}"
               class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                <i class="fa-regular fa-user"></i>
                My profile
            </a>


            <div class="border-t border-gray-100 my-1"></div>

            <form th:action="@{/logout}" method="post" class="w-full">

                <!-- CSRF token (mandatory) -->
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <button type="submit"
                        class="flex items-center gap-3 px-4 py-2 text-sm text-red-600 hover:bg-gray-100 w-full text-left">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    Sign out
                </button>

            </form>
        </div>
    </div>

    <nav class="flex-1 px-2 mt-4 space-y-1">
        <a th:href="@{/events}"
           th:classappend="${activePage == 'events'} ? 'bg-gray-100 text-gray-900' : 'text-gray-600 hover:bg-gray-50'"
           class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fa-solid fa-link w-4 text-center"></i>
            <span>Event types</span>
        </a>

        <a th:href="@{/bookings}"
           th:classappend="${activePage == 'bookings'} ? 'bg-gray-100 text-gray-900' : 'text-gray-600 hover:bg-gray-50'"
           class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fa-solid fa-calendar-check w-4 text-center"></i>
            <span>Bookings</span>
        </a>

        <a th:href="@{/availability}"
           th:classappend="${activePage == 'availability'} ? 'bg-gray-100 text-gray-900' : 'text-gray-600 hover:bg-gray-50'"
           class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fa-solid fa-clock w-4 text-center"></i>
            <span>Availability</span>
        </a>
    </nav>

</aside>

</body>
</html>
