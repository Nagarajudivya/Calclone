<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(activePage)"
       class="w-64 bg-white border-r border-gray-200 flex flex-col h-screen sticky top-0">

    <div class="p-2 mt-2">
        <div class="flex items-center gap-3 px-3 py-2 hover:bg-gray-100 rounded-lg cursor-pointer transition group">
            <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-white text-[11px] font-bold uppercase ring-2 ring-transparent group-hover:ring-gray-200"
                 th:text="${user != null ? #strings.substring(user.username, 0, 1) : 'U'}">
                U
            </div>

            <div class="flex items-center gap-2 flex-1 min-w-0">
                <span class="font-semibold text-gray-900 truncate text-sm"
                      th:text="${user != null ? user.username : 'User Name'}">
                    User Name
                </span>
                <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
            </div>

            <div class="text-gray-400 hover:text-gray-600 p-1">
                <i class="fa-solid fa-magnifying-glass text-xs"></i>
            </div>
        </div>
    </div>

    <nav class="flex-1 px-2 mt-4 space-y-1">
        <a th:href="@{/events}"
           th:classappend="${activePage == 'events'} ? 'bg-gray-100 text-gray-900' : 'text-gray-600 hover:bg-gray-50'"
           class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fa-solid fa-link w-4 text-center"></i>
            <span>Event types</span>
        </a>

        <a th:href="@{/bookings}"
           th:classappend="${activePage == 'bookings'} ? 'bg-gray-100 text-gray-900' : 'text-gray-600 hover:bg-gray-50'"
           class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fa-solid fa-calendar-check w-4 text-center"></i>
            <span>Bookings</span>
        </a>

        <a th:href="@{/availability}"
           th:classappend="${activePage == 'availability'} ? 'bg-gray-100 text-gray-900' : 'text-gray-600 hover:bg-gray-50'"
           class="flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition">
            <i class="fa-solid fa-clock w-4 text-center"></i>
            <span>Availability</span>
        </a>
    </nav>

    <div class="p-4 border-t border-gray-100">
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-500 hover:text-gray-900 text-sm transition">
            <i class="fa-solid fa-circle-question"></i>
            <span>Help</span>
        </a>
    </div>
</aside>

</body>
</html>
