<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${profileUser.fullName} + ' | Booking'"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        .event-row { transition: background 0.12s; }
        .event-row:hover { background: #f9fafb; }
        .event-row:hover .event-title { color: #6d28d9; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4" style="background: #e5e7eb;">

<!-- Profile Card -->
<div class="w-full max-w-2xl bg-white rounded-xl shadow-sm border border-gray-200 p-8 mb-3">
    <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-full flex items-center justify-center text-white text-xl font-bold flex-shrink-0"
             style="background: #7c3aed;">
                <span th:text="${profileUser.fullName != null and !#strings.isEmpty(profileUser.fullName)
                    ? #strings.toUpperCase(#strings.substring(profileUser.fullName, 0, 1))
                    : #strings.toUpperCase(#strings.substring(profileUser.username, 0, 1))}">N</span>
        </div>
        <div>
            <h1 class="text-lg font-bold text-gray-900"
                th:text="${profileUser.fullName != null and !#strings.isEmpty(profileUser.fullName)
                        ? profileUser.fullName
                        : profileUser.username}">Name</h1>
            <p class="text-sm text-gray-500 mt-0.5"
               th:text="${profileUser.jobTitle != null and !#strings.isEmpty(profileUser.jobTitle)
                        ? profileUser.jobTitle : 'Available for meetings'}">Developer</p>
        </div>
    </div>
</div>

<!-- Event Types Card -->
<div class="w-full max-w-2xl bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

    <a th:each="event : ${eventTypes}"
       th:if="${event.active}"
       th:href="@{/book/{user}/{slug}(user=${profileUser.username}, slug=${event.slug})}"
       class="event-row flex items-center justify-between px-6 py-5 border-b border-gray-100 last:border-b-0 no-underline cursor-pointer"
       style="display: flex; text-decoration: none;">

        <div class="flex flex-col gap-1">
            <p class="event-title text-sm font-semibold text-gray-900 transition-colors"
               th:text="${event.title}">Meeting title</p>
            <p th:if="${event.description != null and !#strings.isEmpty(event.description)}"
               class="text-xs text-gray-400"
               th:text="${event.description}">Description</p>
            <div class="flex items-center gap-1.5 mt-1">
                    <span class="inline-flex items-center gap-1 text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        <span th:text="${event.duration} + 'm'">30m</span>
                    </span>
            </div>
        </div>

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="#9ca3af" stroke-width="2" class="flex-shrink-0 ml-4">
            <path d="M9 18l6-6-6-6"/>
        </svg>
    </a>

    <!-- Empty state -->
    <div th:if="${eventTypes == null or #lists.isEmpty(eventTypes)}"
         class="py-16 text-center text-sm text-gray-400">
        No public events available right now.
    </div>
</div>

</body>
</html>
