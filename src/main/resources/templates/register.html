<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
<div class="max-w-md w-full bg-white p-8 rounded-xl shadow-sm border border-gray-200">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Create your account</h1>
        <p class="text-gray-500 mt-2">Start scheduling in minutes</p>
    </div>

    <div th:if="${error}"
         class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg text-center"
         th:text="${error}">
    </div>

    <form th:action="@{/register}" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" required placeholder="johndoe"
                   class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-1 focus:ring-black outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" name="email" required placeholder="you@example.com"
                   class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-1 focus:ring-black outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required placeholder="••••••••"
                   class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-1 focus:ring-black outline-none">
        </div>
        <button type="submit"
                class="w-full bg-black text-white py-2.5 rounded-lg font-bold hover:bg-zinc-800 transition">
            Create account
        </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
        Already have an account?
        <a href="/login" class="text-black font-semibold hover:underline">Sign in</a>
    </p>
</div>
</body>
</html>
