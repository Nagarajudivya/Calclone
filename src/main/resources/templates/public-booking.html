<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${event.title} + ' | Cal Clone'"></title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#f3f4f6] min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-xl shadow-xl overflow-hidden flex flex-col md:flex-row max-w-5xl w-full border border-gray-200">

  <div class="w-full md:w-1/3 p-8 border-r border-gray-100">
    <div class="w-10 h-10 bg-purple-600 rounded-full flex items-center justify-center text-white font-bold mb-4"
         th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</div>

    <p class="text-gray-500 font-medium text-sm mb-1" th:text="${user.username}"></p>
    <h1 class="text-2xl font-bold text-gray-900 mb-4" th:text="${event.title}">Meeting</h1>

    <div class="space-y-3 text-gray-600">
      <div class="flex items-center gap-3">
        <i class="fa-regular fa-clock w-5 text-gray-400"></i>
        <span th:text="${event.duration} + 'm'">15m</span>
      </div>
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-video w-5 text-gray-400"></i>
        <span>Cal Video</span>
      </div>
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-globe w-5 text-gray-400"></i>
        <span class="text-sm">Asia/Kolkata <i class="fa-solid fa-chevron-down text-[10px] ml-1"></i></span>
      </div>
    </div>

    <p class="mt-6 text-gray-500 text-sm leading-relaxed" th:text="${event.description}">
      Quick meeting description.
    </p>
  </div>

  <div class="w-full md:w-1/3 p-8 border-r border-gray-100 bg-white">
    <div class="flex justify-between items-center mb-6">
      <h2 class="font-bold text-gray-900">April <span class="text-gray-400 font-normal">2026</span></h2>
      <div class="flex gap-4">
        <button id="prevMonth" class="text-gray-400 hover:text-black">
          <i class="fa-solid fa-chevron-left"></i>
        </button>

        <button id="nextMonth" class="text-gray-400 hover:text-black">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </div>

    <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-400 uppercase mb-4">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div id="calendarDays" class="grid grid-cols-7 gap-1"></div>
  </div>

  <div class="w-full md:w-1/3 p-8 bg-white overflow-y-auto max-h-[600px]">
    <div class="flex justify-between items-center mb-6">
      <h2 class="font-bold text-gray-900">
        <span id="selectedDay">Mon</span>
        <span id="selectedDate" class="text-gray-400 font-normal">20</span>
      </h2>
      <div class="flex bg-gray-100 rounded-md p-1">
        <button class="text-[10px] px-2 py-0.5 bg-white shadow-sm rounded font-bold">12h</button>
        <button class="text-[10px] px-2 py-0.5 text-gray-500">24h</button>
      </div>
    </div>

    <div id="timeSlots" class="space-y-2"></div>
  </div>
</div>

<div class="fixed bottom-6 text-gray-400 text-sm font-medium">
  Cal.com
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {

      const calendar = document.getElementById("calendarDays");
      const timeSlots = document.getElementById("timeSlots");

      const prevBtn = document.getElementById("prevMonth");
      const nextBtn = document.getElementById("nextMonth");

      const selectedDayEl = document.getElementById("selectedDay");
const selectedDateEl = document.getElementById("selectedDate");

      const today = new Date();

      let currentMonth = today.getMonth();
      let currentYear = today.getFullYear();


      const months = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];

      const monthTitle = document.querySelector("h2");


      function renderCalendar() {

          calendar.innerHTML = "";

          monthTitle.innerHTML = months[currentMonth] + " <span class='text-gray-400 font-normal'>" + currentYear + "</span>";

          let firstDay = new Date(currentYear, currentMonth, 1).getDay();
          let totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

          for (let i = 0; i < firstDay; i++) {
              let empty = document.createElement("div");
              calendar.appendChild(empty);
          }

          for (let day = 1; day <= totalDays; day++) {

              let date = new Date(currentYear, currentMonth, day);
              let btn = document.createElement("button");

              btn.innerText = day;
              btn.className = "h-10 text-sm rounded-md";

              let isPast =
                  date < new Date(today.getFullYear(), today.getMonth(), today.getDate());

              let isWeekend = date.getDay() === 0 || date.getDay() === 6;

              if (isPast || isWeekend) {
                  btn.classList.add("text-gray-300", "cursor-not-allowed");
                  btn.disabled = true;
              } else {
                  btn.classList.add("hover:bg-gray-100");

                  btn.onclick = function () {
                      selectDate(date, btn);
                  };
              }

              calendar.appendChild(btn);
          }

          // 🔹 Disable back button if current month = today month
          if (currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
              prevBtn.classList.add("opacity-30", "cursor-not-allowed");
              prevBtn.disabled = true;
          } else {
              prevBtn.classList.remove("opacity-30");
              prevBtn.disabled = false;
          }
      }

      // 🔹 Select Date
    function selectDate(date, btn) {

    document.querySelectorAll("#calendarDays button")
        .forEach(b => b.classList.remove("bg-black", "text-white"));

    btn.classList.add("bg-black", "text-white");

    // 🔹 Update Day & Date dynamically
    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

    selectedDayEl.innerText = days[date.getDay()];
    selectedDateEl.innerText = date.getDate();

    // Generate slots
    generateTimeSlots();
}

      function generateTimeSlots() {

          timeSlots.innerHTML = "";

          let start = 9 * 60;
          let end = 18 * 60;

          for (let i = start; i < end; i += 15) {

              let hour = Math.floor(i / 60);
              let min = i % 60;

              let ampm = hour >= 12 ? "PM" : "AM";
              let displayHour = hour > 12 ? hour - 12 : hour;

              let time = displayHour + ":" + (min === 0 ? "00" : min) + " " + ampm;

              let btn = document.createElement("button");

              btn.innerText = time;

              btn.className =
                  "w-full py-3 border border-gray-200 rounded-lg text-sm font-bold text-gray-700 hover:border-black hover:bg-gray-50";

              btn.onclick = function () {
                  selectTime(btn);
              };

              timeSlots.appendChild(btn);
          }
      }

      // 🔹 Select Time
      function selectTime(btn) {

          document.querySelectorAll("#timeSlots button")
              .forEach(b => b.classList.remove("bg-black", "text-white"));

          btn.classList.add("bg-black", "text-white");
      }

      // 🔹 Next Month
      nextBtn.onclick = function () {
          currentMonth++;
          if (currentMonth > 11) {
              currentMonth = 0;
              currentYear++;
          }
          renderCalendar();
      };

      // 🔹 Previous Month (restricted)
      prevBtn.onclick = function () {
          if (
              currentMonth === today.getMonth() &&
              currentYear === today.getFullYear()
          ) return;

          currentMonth--;
          if (currentMonth < 0) {
              currentMonth = 11;
              currentYear--;
          }
          renderCalendar();
      };

      renderCalendar();
  });
</script>

</body>
</html>
